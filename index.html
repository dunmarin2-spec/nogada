<!DOCTYPE html>
<html lang="ko">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>노가다의 신 - 실시간 인력매칭</title>
    <script src="https://www.gstatic.com/firebasejs/9.22.0/firebase-app-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/9.22.0/firebase-database-compat.js"></script>
    <style>
        body { font-family: 'Malgun Gothic', sans-serif; margin: 0; padding: 120px 0 90px 0; background: #f0f2f5; }
        /* 상단 카카오페이 바 */
        .kakao-bar { position: fixed; top: 0; width: 100%; height: 55px; background: #fee500; color: #3c1e1e; font-weight: bold; display: flex; align-items: center; justify-content: center; cursor: pointer; z-index: 1000; box-shadow: 0 2px 8px rgba(0,0,0,0.15); }
        /* 입력 상자 */
        .reg-box { position: fixed; top: 55px; width: 100%; background: white; padding: 12px; box-sizing: border-box; border-bottom: 2px solid #ddd; z-index: 999; display: flex; gap: 8px; }
        input { flex: 1; padding: 12px; border: 1px solid #ccc; border-radius: 8px; font-size: 14px; outline: none; }
        .btn-reg { background: #2196F3; color: white; border: none; padding: 10px 18px; border-radius: 8px; font-weight: bold; cursor: pointer; }
        /* 일자리 리스트 */
        .container { padding: 10px; }
        .card { background: white; margin-bottom: 15px; padding: 18px; border-radius: 15px; border-left: 8px solid #2196F3; box-shadow: 0 4px 10px rgba(0,0,0,0.08); }
        .card b { font-size: 18px; color: #1a1a1a; display: block; margin-bottom: 5px; }
        .card p { margin: 4px 0; color: #555; font-size: 15px; }
        .time { font-size: 12px; color: #999; margin-top: 8px; }
        /* 하단 쿠팡 배너 */
        .coupang-footer { position: fixed; bottom: 0; width: 100%; height: 85px; background: white; border-top: 3px solid #fd7e14; display: flex; align-items: center; padding: 0 20px; box-sizing: border-box; cursor: pointer; z-index: 1000; }
        .ad-btn { background: #fd7e14; color: white; padding: 8px 15px; border-radius: 6px; font-size: 13px; font-weight: bold; margin-left: auto; }
    </style>
</head>
<body>

    <div class="kakao-bar" onclick="location.href='https://qr.kakaopay.com/FRK8J0SAD'">
        💰 [긴급] 일자리 상단 노출권 구매/후원 (클릭)
    </div>

    <div class="reg-box">
        <input type="text" id="loc" placeholder="현장(예: 강남)">
        <input type="text" id="pay" placeholder="단가(예: 19만)">
        <button class="btn-reg" onclick="addJob()">등록</button>
    </div>

    <div class="container" id="job-list"></div>

    <div class="coupang-footer" onclick="window.open('https://link.coupang.com/a/ebozHo')">
        <div style="flex:1">
            <div style="font-size:14px; color:#fd7e14; font-weight:bold;">👟 현장 필수! 발 편한 안전화</div>
            <div style="font-size:12px; color:#333;">가성비 끝판왕 모델, 내일 당장 도착!</div>
        </div>
        <div class="ad-btn">구경하기</div>
    </div>

    <script>
        // 형님의 Firebase 설정 (URL 업데이트 완료!)
        const firebaseConfig = {
            apiKey: "AIzaSyDGip6cFRf2Ljz3_e7QaocWBGGbwqTe3pw",
            authDomain: "nogada-db.firebaseapp.com",
            databaseURL: "https://nogada-db-default-rtdb.asia-southeast1.firebasedatabase.app/", 
            projectId: "nogada-db",
            storageBucket: "nogada-db.firebasestorage.app",
            messagingSenderId: "479523158859",
            appId: "1:479523158859:web:582940fdbc348b251306ce"
        };

        // Firebase 초기화
        firebase.initializeApp(firebaseConfig);
        const db = firebase.database();

        // [함수] 일자리 데이터 저장
        function addJob() {
            const loc = document.getElementById('loc').value;
            const pay = document.getElementById('pay').value;
            if(loc && pay) {
                db.ref('jobs').push({
                    loc: loc,
                    pay: pay,
                    time: new Date().toLocaleString()
                });
                document.getElementById('loc').value = '';
                document.getElementById('pay').value = '';
                alert('일자리가 등록되었습니다!');
            } else {
                alert('현장과 단가를 모두 입력해주세요!');
            }
        }

        // [함수] 실시간 데이터 읽어오기
        db.ref('jobs').on('value', (snapshot) => {
            const listArea = document.getElementById('job-list');
            listArea.innerHTML = ''; // 초기화 후 다시 그리기
            
            snapshot.forEach((child) => {
                const data = child.val();
                const cardHtml = `
                    <div class="card">
                        <b>🚧 [${data.loc}] 현장 긴급구인</b>
                        <p>일당: <span style="color:#2196F3; font-weight:bold;">${data.pay}</span></p>
                        <p class="time">등록일시: ${data.time}</p>
                        <button class="btn-reg" style="width:100%; margin-top:10px; background:#4CAF50;" onclick="alert('전화연결 로직은 추후 업데이트 예정입니다!')">연락처 확인</button>
                    </div>
                `;
                listArea.insertAdjacentHTML('afterbegin', cardHtml); // 최신글 상단 배치
            });
        });
    </script>
</body>
</html>
