<!DOCTYPE html>
<html lang="ko">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>노가다의 신 - 찬둥 에디션</title>
    <link rel="icon" href="data:image/svg+xml,<svg xmlns=%22http://www.w3.org/2000/svg%22 viewBox=%220 0 100 100%22><text y=%22.9em%22 font-size=%2290%22>👷</text></svg>">
    <script src="https://www.gstatic.com/firebasejs/9.22.0/firebase-app-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/9.22.0/firebase-database-compat.js"></script>
    <style>
        /* 💡 필기체 스타일을 위한 폰트 추가 */
        @import url('https://fonts.googleapis.com/css2?family=Nanum+Pen+Script&display=swap');

        /* 상단 입력창이 커진 만큼 본문이 가려지지 않게 여백(padding) 조정 */
        body { font-family: 'Malgun Gothic', sans-serif; margin: 0; padding: 220px 0 90px 0; background: #f0f2f5; }
        
        /* 💡 찬둥의 필기체 시그니처 스타일 */
        .chan-doong-signature { font-family: 'Nanum Pen Script', cursive; font-size: 20px; color: #3c1e1e; transform: rotate(-10deg); margin-bottom: -15px; z-index: 1100; }

        /* 상단 바 */
        .kakao-bar { position: fixed; top: 0; width: 100%; height: 60px; background: #fee500; color: #3c1e1e; font-weight: bold; display: flex; flex-direction: column; align-items: center; justify-content: center; cursor: pointer; z-index: 1000; box-shadow: 0 2px 5px rgba(0,0,0,0.1); }
        
        /* 🌟 모바일 맞춤형 3줄짜리 큼직한 입력 상자 */
        .reg-box { position: fixed; top: 60px; width: 100%; background: white; padding: 12px; box-sizing: border-box; border-bottom: 2px solid #ddd; z-index: 999; display: flex; flex-direction: column; gap: 8px; }
        .input-row { display: flex; gap: 8px; width: 100%; }
        input { flex: 1; padding: 12px; border: 1px solid #ccc; border-radius: 6px; font-size: 14px; outline: none; box-sizing: border-box; min-width: 0; }
        .btn-reg { flex: 1; background: #2196F3; color: white; border: none; padding: 12px; border-radius: 6px; font-size: 15px; font-weight: bold; cursor: pointer; box-sizing: border-box; }
        
        /* 일자리 리스트 & 삭제 버튼 */
        .container { padding: 10px; }
        .card { position: relative; background: white; margin-bottom: 12px; padding: 15px; border-radius: 12px; border-left: 6px solid #2196F3; box-shadow: 0 2px 8px rgba(0,0,0,0.05); }
        .card b { font-size: 17px; color: #1a1a1a; display: block; margin-bottom: 5px; padding-right: 30px; }
        .type-badge { background: #e9ecef; color: #d35400; padding: 3px 6px; border-radius: 4px; font-size: 14px; margin-right: 5px; }
        .card p { margin: 4px 0; color: #555; font-size: 14px; }
        .time { font-size: 12px; color: #999; margin-top: 8px; }
        
        /* 삭제 버튼 (X 표시) */
        .btn-delete { position: absolute; top: 15px; right: 15px; background: none; border: none; color: #ccc; font-size: 18px; cursor: pointer; }
        .btn-delete:hover { color: #ff4757; }

        /* 하단 쿠팡 배너 */
        .coupang-footer { position: fixed; bottom: 0; width: 100%; height: 80px; background: white; border-top: 3px solid #fd7e14; display: flex; align-items: center; padding: 0 15px; box-sizing: border-box; cursor: pointer; z-index: 1000; }
        .ad-btn { background: #fd7e14; color: white; padding: 8px 12px; border-radius: 5px; font-size: 12px; font-weight: bold; margin-left: auto; }
    </style>
</head>
<body>

    <div class="kakao-bar" onclick="location.href='https://qr.kakaopay.com/FRK8J0SAD'">
        <span class="chan-doong-signature">찬둥의</span>
        <span>💰 [긴급] 일자리 상단 노출권 구매/후원 (클릭)</span>
    </div>

    <div class="reg-box">
        <div class="input-row">
            <input type="text" id="jobType" placeholder="직종(예: 폼맨)">
            <input type="text" id="loc" placeholder="현장(예: 강남)">
        </div>
        <div class="input-row">
            <input type="text" id="pay" placeholder="단가(예: 19만)">
            <input type="tel" id="tel" placeholder="연락처(010...)">
        </div>
        <div class="input-row">
            <input type="password" id="pwd" placeholder="삭제비번(4자리)">
            <button class="btn-reg" onclick="addJob()">등록하기</button>
        </div>
    </div>

    <div class="container" id="job-list"></div>

    <div class="coupang-footer" onclick="window.open('https://link.coupang.com/a/ebozHo')">
        <div style="flex:1">
            <div style="font-size:14px; color:#fd7e14; font-weight:bold;">👟 현장 필수! 발 편한 안전화</div>
            <div style="font-size:12px; color:#333;">가성비 끝판왕 모델, 내일 당장 도착!</div>
        </div>
        <div class="ad-btn">구경하기</div>
    </div>

    <script>
        // 형님의 Firebase 설정 (유지)
        const firebaseConfig = {
            apiKey: "AIzaSyDGip6cFRf2Ljz3_e7QaocWBGGbwqTe3pw",
            authDomain: "nogada-db.firebaseapp.com",
            databaseURL: "https://nogada-db-default-rtdb.asia-southeast1.firebasedatabase.app/", 
            projectId: "nogada-db",
            storageBucket: "nogada-db.firebasestorage.app",
            messagingSenderId: "479523158859",
            appId: "1:479523158859:web:582940fdbc348b251306ce"
        };

        firebase.initializeApp(firebaseConfig);
        const db = firebase.database();

        function addJob() {
            const jobType = document.getElementById('jobType').value;
            const loc = document.getElementById('loc').value;
            const pay = document.getElementById('pay').value;
            const tel = document.getElementById('tel').value;
            const pwd = document.getElementById('pwd').value;

            if(jobType && loc && pay && tel && pwd) {
                db.ref('jobs').push({
                    type: jobType,
                    loc: loc,
                    pay: pay,
                    tel: tel,
                    pwd: pwd,
                    time: new Date().toLocaleString()
                });
                document.getElementById('jobType').value = '';
                document.getElementById('loc').value = '';
                document.getElementById('pay').value = '';
                document.getElementById('tel').value = '';
                document.getElementById('pwd').value = '';
                alert('일자리가 성공적으로 등록되었습니다!');
            } else {
                alert('빈칸을 모두 채워주세요!');
            }
        }

        function deleteJob(jobKey, correctPwd) {
            const inputPwd = prompt('글을 삭제하시려면 설정한 비밀번호를 입력하세요.');
            if (inputPwd === null) return; 
            if (inputPwd === correctPwd) {
                db.ref('jobs').child(jobKey).remove(); 
                alert('삭제 완료되었습니다.');
            } else {
                alert('비밀번호가 틀렸습니다!');
            }
        }

        db.ref('jobs').on('value', (snapshot) => {
            const listArea = document.getElementById('job-list');
            listArea.innerHTML = ''; 
            snapshot.forEach((child) => {
                const data = child.val();
                const key = child.key; 
                const displayType = data.type ? data.type : "미지정";
                const cardHtml = `
                    <div class="card">
                        <b><span class="type-badge">[${displayType}]</span> 🚧 ${data.loc}</b>
                        <button class="btn-delete" onclick="deleteJob('${key}', '${data.pwd}')">✖</button>
                        <p>일당: <span style="color:#2196F3; font-weight:bold;">${data.pay}</span></p>
                        <p class="time">등록일시: ${data.time}</p>
                        <div style="display: flex; gap: 8px; margin-top: 10px;">
                            <a href="tel:${data.tel}" class="btn-reg" style="flex: 1; text-align: center; text-decoration: none; background: #4CAF50;">📞 전화연결</a>
                            <a href="sms:${data.tel}" class="btn-reg" style="flex: 1; text-align: center; text-decoration: none; background: #ff9800;">💬 문자지원</a>
                        </div>
                    </div>
                `;
                listArea.insertAdjacentHTML('afterbegin', cardHtml); 
            });
        });
    </script>
</body>
</html>
